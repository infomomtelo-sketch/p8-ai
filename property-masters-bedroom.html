<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RunP8 Rentals</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1120;
      color: white;
      padding: 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 18px;
    }

    .price {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .meta {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(37,99,235,0.2);
      color: #93c5fd;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 14px;
      color: #e5e7eb;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #1f2937;
      color: white;
      border: 1px solid #334155;
    }
  </style>
</head>

<body>

  <div class="wrap">
    <h1>Available Rentals</h1>

    <!-- MASTER BEDROOM LISTING -->
    <div class="card">

      <img src="images/IMG_7730.jpeg" alt="Master Bedroom Fresno">

      <div class="card-body">

        <div class="price">$1,200/mo • Utilities included</div>

        <div class="title">Master Bedroom with Private Bathroom</div>

        <div class="meta">
          Fresno, CA • Private bath • Shared home
        </div>

        <div class="status">Available Now</div>

        <div class="desc">
          Ideal for traveling professionals. Clean, quiet, and move-in ready with private bathroom included.
        </div>

        <a class="btn btn-primary" href="property-masters-bedroom.html">
          View Details
        </a>

        <a class="btn btn-secondary" href="property-masters-bedroom.html">
          Continue
        </a>

      </div>
    </div>

  </div>

</body>
</html>
