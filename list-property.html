<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Property - ProrAI8</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1120;
color:white;
padding:30px 20px;
}

.container{
max-width:700px;
margin:auto;
background:#111827;
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
text-align:center;
}

label{
display:block;
margin-top:14px;
font-size:14px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.back{
display:block;
margin-bottom:15px;
color:#60a5fa;
text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<a class="back" href="index.html">← Back to Home</a>

<h1>List Property</h1>

<p>Add occupied units, vacant properties, or upcoming vacancies.</p>

<form>

<label>Property Address</label>
<input type="text" placeholder="123 Main St">

<label>Property Type</label>
<select>
<option>House</option>
<option>Apartment</option>
<option>Studio</option>
<option>Room</option>
<option>ADU</option>
</select>

<label>Bedrooms</label>
<input type="number">

<label>Bathrooms</label>
<input type="number">

<label>Monthly Rent ($)</label>
<input type="number">

<label>Occupancy Status</label>
<select>
<option>Vacant</option>
<option>Occupied</option>
<option>Upcoming Vacancy</option>
</select>

<label>Available Date</label>
<input type="date">

<label>Notes</label>
<textarea rows="4" placeholder="Additional details"></textarea>

<button type="submit">Save Property</button>

</form>

</div>

</body>
</html>
