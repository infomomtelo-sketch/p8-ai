<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Showing | RunP8</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1120;
      color: white;
      padding: 30px 20px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topbar a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: #1f2937;
      color: white;
      border: 1px solid #334155;
      font-weight: 600;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
    }

    p {
      color: #cbd5e1;
    }

    .property-pill {
      display: inline-block;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.2);
      color: #93c5fd;
      font-weight: 700;
      font-size: 13px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .success {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(134, 239, 172, 0.35);
      color: #bbf7d0;
      font-weight: 700;
    }

  </style>
</head>
<body>
  <div class="container">

    <div class="topbar">
      <a href="rentals.html">← Back to Listings</a>
      <a href="index.html">Home</a>
    </div>

    <div class="card">
      <div class="property-pill" id="propertyName">Property</div>

      <h1>Schedule a Showing</h1>
      <p>
        Choose a time that works for you. We’ll review your request and confirm the next step.
      </p>

      <form id="showingForm" action="https://formspree.io/f/mreyjvap" method="POST">

        <input type="hidden" name="_subject" value="RunP8 Showing Request" />
        <input type="hidden" id="property_hidden" name="property_name" />

        <div class="field">
          <label>Name</label>
          <input name="name" required />
        </div>

        <div class="field">
          <label>Email</label>
          <input name="email" type="email" required />
        </div>

        <div class="field">
          <label>Phone</label>
          <input name="phone" />
        </div>

        <div class="field">
          <label>Preferred Date</label>
          <input name="date" type="date" required />
        </div>

        <div class="field">
          <label>Preferred Time</label>
          <input name="time" type="time" required />
        </div>

        <button class="btn" type="submit">Request Showing</button>
      </form>

      <div class="success" id="successMsg">
        ✅ Showing request submitted.<br><br>
        We’ll review your request and confirm availability.<br><br>
        You can continue browsing while we process this.
      </div>

    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const property = params.get("property") || "Unknown Property";

    document.getElementById("propertyName").innerText = property;
    document.getElementById("property_hidden").value = property;

    const form = document.getElementById("showingForm");
    const success = document.getElementById("successMsg");

    form.addEventListener("submit", async function(e){
      e.preventDefault();

      const data = new FormData(form);

      const res = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { "Accept": "application/json" }
      });

      if(res.ok){
        form.style.display = "none";
        success.style.display = "block";
      } else {
        alert("Error submitting request");
      }
    });
  </script>

</body>
</html>
