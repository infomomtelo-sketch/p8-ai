<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RunP8 | AI for your business</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}

    body{
      background:#f8fafc;
      color:#111827;
    }

    /* HEADER */
    .header{
      position:sticky;
      top:0;
      background:white;
      z-index:999;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      border-bottom:1px solid #e5e7eb;
    }

    .logo{
      font-weight:700;
      cursor:pointer;
    }

    .menu-btn{
      font-size:20px;
      background:#2563eb;
      color:white;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
    }

    .menu{
      position:absolute;
      top:70px;
      right:20px;
      background:white;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      display:none;
      flex-direction:column;
      width:220px;
      padding:10px;
      z-index:1000;
    }

    .menu a{
      padding:10px;
      text-decoration:none;
      color:#111827;
      border-radius:8px;
    }

    .menu a:hover{
      background:#f1f5f9;
    }

    .menu.open{
      display:flex;
    }

    /* HERO */
    .hero{
      padding:60px 20px;
      text-align:center;
    }

    .hero h1{
      font-size:28px;
      margin-bottom:12px;
    }

    .btn{
      margin-top:20px;
      background:#2563eb;
      color:white;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    /* SECTIONS */
    section{
      padding:60px 20px;
      max-width:900px;
      margin:auto;
    }

    /* CHAT */
    #chatbox{
      position:fixed;
      bottom:20px;
      right:20px;
      width:300px;
      background:#020617;
      color:white;
      border-radius:12px;
      display:none;
      flex-direction:column;
      overflow:hidden;
    }

    #chatMessages{
      height:200px;
      overflow-y:auto;
      padding:10px;
      font-size:14px;
    }

    #chatInput{
      border:none;
      padding:10px;
      outline:none;
    }

    #chatToggle{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#2563eb;
      color:white;
      border:none;
      padding:12px 16px;
      border-radius:20px;
      cursor:pointer;
    }

    /* FOOTER */
    footer{
      padding:40px 20px;
      background:white;
      border-top:1px solid #e5e7eb;
      text-align:center;
    }

    footer a{
      margin:0 10px;
      color:#374151;
      text-decoration:none;
    }

    footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" onclick="goHome()">RunP8</div>
  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <div class="menu" id="menu">
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#chat">P8 AI</a>
    <a href="#contact">Contact</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
  </div>
</div>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Run your business with one AI</h1>
  <p>Simple. Clear. No confusion.</p>
  <button class="btn" onclick="scrollToSection('chat')">Start with P8</button>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Services</h2>
  <p>Property management, rentals, automation, and AI workflows.</p>
</section>

<!-- CHAT -->
<section id="chat">
  <h2>P8 AI Assistant</h2>
  <button class="btn" onclick="openChat()">Open P8</button>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact</h2>
  <p>Email or reach out anytime.</p>
</section>

<!-- FOOTER -->
<footer>
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>
  <a href="#">Cookies</a>
</footer>

<!-- CHAT BUTTON -->
<button id="chatToggle" onclick="openChat()">P8</button>

<!-- CHAT BOX -->
<div id="chatbox">
  <div id="chatMessages"></div>
  <input id="chatInput" placeholder="Ask P8..." onkeydown="handleChat(event)" />
</div>

<!-- SCRIPT -->
<script>

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
}

function goHome(){
  window.scrollTo({top:0,behavior:"smooth"});
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* CHAT */
function openChat(){
  document.getElementById("chatbox").style.display="flex";
  document.getElementById("chatToggle").style.display="none";
}

function handleChat(e){
  if(e.key==="Enter"){
    const input=document.getElementById("chatInput");
    const msg=input.value.trim();
    if(!msg) return;

    addMessage("You: "+msg);

    /* SIMPLE P8 BRAIN */
    let reply="I understand. Tell me more.";

    if(msg.toLowerCase().includes("rental")){
      reply="I can help you list or manage rentals.";
    }
    if(msg.toLowerCase().includes("care")){
      reply="I can help with caregiving workflows.";
    }

    setTimeout(()=>addMessage("P8: "+reply),500);

    input.value="";
  }
}

function addMessage(text){
  const div=document.createElement("div");
  div.innerText=text;
  document.getElementById("chatMessages").appendChild(div);
}

</script>

</body>
</html>
