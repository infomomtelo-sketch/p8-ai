<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>P8 Rental</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif;}

body{
background:#0b1120;
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
background:#020617;
}

.logo{
font-weight:700;
font-size:18px;
}

.nav-right{
display:flex;
gap:16px;
align-items:center;
}

.btn{
padding:10px 16px;
border-radius:10px;
border:none;
cursor:pointer;
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-outline{
background:transparent;
color:white;
}

/* HERO */
.hero{
display:flex;
gap:40px;
padding:40px 24px;
align-items:center;
flex-wrap:wrap;
}

.hero-left{
flex:1;
min-width:280px;
}

.hero-left h1{
font-size:40px;
margin-bottom:16px;
}

.hero-left p{
color:#cbd5e1;
margin-bottom:20px;
}

.hero-buttons{
display:flex;
gap:12px;
}

.hero-right{
flex:1;
min-width:280px;
}

.hero-right img{
width:100%;
border-radius:16px;
}

/* SECTION */
.section{
padding:30px 24px;
}

.cards{
display:flex;
gap:16px;
flex-wrap:wrap;
}

.card{
background:#111827;
padding:16px;
border-radius:16px;
width:250px;
}

.card img{
width:100%;
border-radius:12px;
margin-bottom:10px;
}

.card h3{
margin-bottom:6px;
}

.card p{
color:#94a3b8;
font-size:14px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">P8 Rental</div>

<div class="nav-right">
<button class="btn btn-outline" onclick="scrollToSection()">Browse Rentals</button>
<button class="btn btn-primary" onclick="goOwner()">List Property</button>
</div>
</div>

<!-- HERO -->
<div class="hero">

<div class="hero-left">
<h1>Find or list quality spaces</h1>
<p>
Rooms, ADUs, and flexible stays for professionals, travel workers, and everyday renters.
</p>

<div class="hero-buttons">
<button class="btn btn-primary" onclick="scrollToSection()">Browse Rentals</button>
<button class="btn btn-outline" onclick="goOwner()">For Owners</button>
<button class="btn btn-outline" onclick="alert('AI coming next phase')">Ask P8 AI</button>
</div>
</div>

<div class="hero-right">
<img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
</div>

</div>

<!-- RENTALS -->
<div class="section" id="rentals">
<h2>Available Rentals</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<h3>Private Room</h3>
<p>Near hospital • $850/mo</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688">
<h3>Studio</h3>
<p>Downtown • $1200/mo</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb">
<h3>ADU Unit</h3>
<p>Private entrance • $1500/mo</p>
</div>

</div>
</div>

<script>
function scrollToSection(){
document.getElementById("rentals").scrollIntoView({behavior:"smooth"});
}

function goOwner(){
window.location.href = "/list-property.html";
}
</script>

</body>
</html>
