<script>
const WORKER_URL = "https://p8-ai.infomomtelo.workers.dev";

let conversation = [
  {
    role: "system",
    content: "You are P8 AI helping users with rental listings, pricing, and property management."
  }
];

function addMessage(role, text) {
  const messages = document.getElementById("aiMessages");

  const row = document.createElement("div");
  row.className = "ai-msg " + role;

  const bubble = document.createElement("div");
  bubble.className = "ai-bubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  messages.appendChild(row);

  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage(message) {
  conversation.push({ role: "user", content: message });

  addMessage("user", message);

  const typing = document.createElement("div");
  typing.className = "ai-msg bot";
  typing.innerHTML = '<div class="ai-bubble">P8 AI is thinking...</div>';
  document.getElementById("aiMessages").appendChild(typing);

  try {
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: conversation
      })
    });

    const data = await res.json();

    typing.remove();

    const reply = data.reply || "No response from AI.";

    conversation.push({ role: "assistant", content: reply });

    addMessage("bot", reply);

  } catch (err) {
    typing.remove();
    addMessage("bot", "Error connecting to AI.");
  }
}

document.getElementById("aiForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const input = document.getElementById("aiInput");
  const message = input.value.trim();

  if (!message) return;

  input.value = "";

  sendMessage(message);
});
</script>
