<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>P8 AI | Inquiry</title>
  <meta
    name="description"
    content="RunP8 inquiry flow for property showings, pre-approval, and rental next steps."
  />
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --bubble:#eef3ff;
      --bubble2:#f8fbff;
      --text:#0f172a;
      --muted:#667085;
      --line:#d9e2f2;
      --blue:#3563eb;
      --blue-dark:#274fd1;
      --shadow:0 18px 50px rgba(15,23,42,0.08);
      --radius:24px;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 22px 16px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 74px;
      height: 74px;
      border-radius: 22px;
      background: #dfe9ff;
      border: 1px solid #cfdcff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 24px;
      color: var(--blue);
      flex: 0 0 auto;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
    }

    .brand-text p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .back-link {
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 18px;
      box-shadow: var(--shadow);
      min-height: 72vh;
    }

    .section-title {
      background: var(--bubble);
      color: #2046c8;
      border-radius: 999px;
      padding: 15px 18px;
      text-align: center;
      font-weight: 700;
      margin-bottom: 16px;
      font-size: 15px;
    }

    .property-summary {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.04);
    }

    .property-summary h2 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    .property-meta {
      color: var(--muted);
      font-size: 17px;
      margin-bottom: 12px;
    }

    .property-desc {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }

    .msg {
      background: var(--bubble2);
      border: 1px solid #e4ecfb;
      border-radius: 20px;
      padding: 15px 16px;
      margin-bottom: 12px;
      line-height: 1.5;
      font-size: 16px;
    }

    .msg.p8 {
      background: #f8fbff;
    }

    .msg.user {
      background: #ffffff;
      border-color: var(--line);
    }

    .msg.muted {
      color: var(--muted);
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px 18px;
      margin: 8px 0 12px;
      background: var(--blue);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s ease, transform .05s ease;
    }

    .btn:hover {
      background: var(--blue-dark);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .footer-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    @media (max-width:640px) {
      .logo {
        width: 66px;
        height: 66px;
        border-radius: 18px;
        font-size: 22px;
      }

      .brand-text h1 {
        font-size: 20px;
      }

      .property-summary h2 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand-wrap">
        <div class="logo">P8</div>
        <div class="brand-text">
          <h1>RunP8 Inquiry</h1>
          <p>Clear next steps for renters and property inquiries</p>
        </div>
      </div>

      <a class="back-link" href="https://runp8-rental.pages.dev">← Back to listings</a>
    </div>

    <div class="shell" id="chat"></div>
  </div>

  <script>
    const API_BASE = "https://runp8-kv-api.infomomtelo.workers.dev";
    const LISTINGS_URL = "https://runp8-rental.pages.dev";

    const chat = document.getElementById("chat");

    let selectedProperty = null;
    let applicantData = {};
    let currentStep = 0;

    function addMsg(text, type = "p8", extraClass = "") {
      const div = document.createElement("div");
      div.className = "msg " + type + (extraClass ? " " + extraClass : "");
      div.innerText = text;
      chat.appendChild(div);
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    function addButton(label, action, secondary = false) {
      const btn = document.createElement("button");
      btn.className = "btn" + (secondary ? " secondary" : "");
      btn.innerText = label;
      btn.onclick = action;
      chat.appendChild(btn);
    }

    function clearButtons() {
      document.querySelectorAll(".btn").forEach(btn => btn.remove());
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getPropertyIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("property");
    }

    function renderHeader() {
      const div = document.createElement("div");
      div.className = "section-title";
      div.innerText = "Rental inquiry";
      chat.appendChild(div);
    }

    function renderPropertySummary(property) {
      const wrap = document.createElement("div");
      wrap.className = "property-summary";
      wrap.innerHTML = `
        <h2>${escapeHtml(property.title || "Untitled Property")}</h2>
        <div class="property-meta">$${escapeHtml(property.price || "")} · ${escapeHtml(property.location || "")}</div>
        <div class="property-desc">${escapeHtml(property.desc || "No description provided.")}</div>
        <div class="footer-note">You are now in the inquiry flow for this property.</div>
      `;
      chat.appendChild(wrap);
    }

    async function boot() {
      chat.innerHTML = "";
      renderHeader();

      const propertyId = getPropertyIdFromUrl();

      if (!propertyId) {
        addMsg("No property was selected.");
        addMsg("Please go back to the listing page and choose a property first.", "p8", "muted");
        addButton("Back to Listings", () => {
          window.location.href = LISTINGS_URL;
        }, true);
        return;
      }

      addMsg("Loading your selected property...", "p8", "muted");

      try {
        const res = await fetch(API_BASE + "/list");
        const properties = await res.json();

        if (!Array.isArray(properties)) {
          throw new Error("Invalid property response.");
        }

        const property = properties.find(p => String(p.id) === String(propertyId));

        chat.innerHTML = "";
        renderHeader();

        if (!property) {
          addMsg("We couldn't find that property.");
          addMsg("It may have been removed or the link may be incomplete.", "p8", "muted");
          addButton("Back to Listings", () => {
            window.location.href = LISTINGS_URL;
          }, true);
          return;
        }

        selectedProperty = property;
        startInquiry();

      } catch (err) {
        chat.innerHTML = "";
        renderHeader();
        addMsg("We couldn't load the property right now.");
        addMsg("Error: " + err.message, "p8", "muted");
        addButton("Try Again", boot);
        addButton("Back to Listings", () => {
          window.location.href = LISTINGS_URL;
        }, true);
      }
    }

    function startInquiry() {
      renderPropertySummary(selectedProperty);

      addMsg("You selected this property.");
      addMsg("I’ll help you move through the next steps clearly.");
      addMsg("We’ll start with a quick pre-approval before scheduling the showing.");

      addButton("Start Pre-Approval", beginPreApproval);
      addButton("Back to Listings", () => {
        window.location.href = LISTINGS_URL;
      }, true);
    }

    function beginPreApproval() {
      clearButtons();
      applicantData = {};
      currentStep = 1;
      runPreApproval();
    }

    function runPreApproval() {
      if (currentStep === 1) {
        addMsg("When do you plan to move in?");
        addButton("ASAP", () => saveAnswer("moveIn", "ASAP"));
        addButton("Within 30 days", () => saveAnswer("moveIn", "Within 30 days"));
        addButton("Flexible", () => saveAnswer("moveIn", "Flexible"));
        return;
      }

      if (currentStep === 2) {
        addMsg("How many occupants?");
        addButton("1", () => saveAnswer("occupants", "1"));
        addButton("2", () => saveAnswer("occupants", "2"));
        addButton("3+", () => saveAnswer("occupants", "3+"));
        return;
      }

      if (currentStep === 3) {
        addMsg("Any pets?");
        addButton("No", () => saveAnswer("pets", "No"));
        addButton("Yes", () => saveAnswer("pets", "Yes"));
        return;
      }

      if (currentStep === 4) {
        addMsg("Estimated monthly income?");
        addButton("< $3k", () => saveAnswer("income", "< $3k"));
        addButton("$3k - $6k", () => saveAnswer("income", "$3k - $6k"));
        addButton("> $6k", () => saveAnswer("income", "> $6k"));
        return;
      }

      evaluateApplicant();
    }

    function saveAnswer(key, value) {
      clearButtons();
      applicantData[key] = value;
      addMsg(value, "user");
      currentStep += 1;
      runPreApproval();
    }

    function evaluateApplicant() {
      addMsg("Checking eligibility...");

      if (applicantData.income === "> $6k") {
        addMsg("You're pre-approved.");
        showSchedule();
      } else {
        addMsg("We may need additional information.");
        addButton("Upload documents", applicationFlow);
        addButton("Continue anyway", showSchedule, true);
      }
    }

    function showSchedule() {
      clearButtons();
      addMsg("Choose a showing time:");
      addButton("Friday 4PM", () => confirmShowing("Friday 4PM"));
      addButton("Saturday 10AM", () => confirmShowing("Saturday 10AM"));
      addButton("Sunday 2PM", () => confirmShowing("Sunday 2PM"));
    }

    function confirmShowing(slot) {
      clearButtons();
      addMsg(slot, "user");
      addMsg("Showing scheduled for " + slot + ".");
      addMsg("Ready to move forward?");
      addButton("Apply Now", applicationFlow);
      addButton("Ask Questions", () => addMsg("Ask anything."), true);
      addButton("Not Interested", notInterestedFlow, true);
    }

    function notInterestedFlow() {
      clearButtons();
      addMsg("No problem.");
      addMsg("You can return to listings anytime.");
      addButton("Back to Listings", () => {
        window.location.href = LISTINGS_URL;
      }, true);
    }

    function applicationFlow() {
      clearButtons();
      addMsg("To continue, please prepare:");
      addMsg("• ID");
      addMsg("• Proof of income");
      addMsg("• Background check consent");
      addButton("Submit Application", approvalFlow);
      addButton("Back to Listings", () => {
        window.location.href = LISTINGS_URL;
      }, true);
    }

    function approvalFlow() {
      clearButtons();
      addMsg("You're approved.");
      addMsg("To secure the property:");
      addButton("Pay Deposit", paymentFlow);
      addButton("View Lease", () => addMsg("Lease preview."), true);
      addButton("Move-in Guide", () => addMsg("Move-in instructions."), true);
    }

    function paymentFlow() {
      clearButtons();
      addMsg("Deposit paid.");
      addMsg("Welcome to your new home.");
      addButton("Back to Listings", () => {
        window.location.href = LISTINGS_URL;
      }, true);
    }

    boot();
  </script>
</body>
</html>
