<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RunP8</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#0f172a;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

.btn{
background:#2f5ef7;
color:#fff;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
display:inline-block;
border:none;
cursor:pointer;
}

.card{
background:#fff;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<div class="wrap">

<h1>Property management without confusion</h1>
<p>Clear system. Real process. No guessing.</p>

<a href="#form" class="btn">Start now</a>

  <h2>Featured Properties</h2>

<div class="card">
<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994" width="100%">
<h3>Fresno Home</h3>
<p>$2,450 / month</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688" width="100%">
<h3>ADU Unit</h3>
<p>$1,250 / month</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1494526585095-c41746248156" width="100%">
<h3>Private Room</h3>
<p>$875 / month</p>
</div>

  <h2 id="form">Submit your property</h2>

<form id="formData" action="https://formspree.io/f/mreyjvap" method="POST">

<input name="email" placeholder="Email" required><br><br>
<input name="phone" placeholder="Phone"><br><br>
<input name="street" placeholder="Street"><br><br>
<input name="city" placeholder="City"><br><br>
<input name="state" placeholder="State"><br><br>
<input name="zip" placeholder="Zip"><br><br>

<select name="service">
<option>Full management</option>
<option>Placement only</option>
</select><br><br>

<textarea name="notes" placeholder="Notes"></textarea><br><br>

<button class="btn">Submit</button>

</form>

<div id="success" style="display:none; color:green; margin-top:20px;">
Submitted successfully. We will contact you.
</div>

</div>

<script>
const form = document.getElementById("formData");
const success = document.getElementById("success");

form.addEventListener("submit", async function(e){
e.preventDefault();

const data = new FormData(form);

const res = await fetch(form.action,{
method:"POST",
body:data,
headers:{ "Accept":"application/json" }
});

if(res.ok){
form.style.display="none";
success.style.display="block";
}
});
</script>

</body>
</html>
