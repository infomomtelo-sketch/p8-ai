<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RunP8</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.wrap{
max-width:900px;
margin:auto;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
background:white;
padding:15px;
border-bottom:1px solid #eee;
}

.btn{
background:#2f5ef7;
color:white;
padding:10px 16px;
border-radius:8px;
text-decoration:none;
border:none;
}

.hero{
padding:50px 20px;
background:white;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

input,textarea,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

.success{
display:none;
background:#d1fae5;
padding:10px;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
<div><b>RunP8</b></div>
<a href="#form" class="btn">Get started</a>
</div>

<div class="hero wrap">
<h1>Property management without confusion</h1>
<p>Clear system. Real process. No guessing.</p>
<a href="#form" class="btn">Start now</a>
</div>

<div class="wrap">
<div class="card">Step 1 – Submit your property</div>
<div class="card">Step 2 – We prepare it</div>
<div class="card">Step 3 – We find tenant</div>
<div class="card">Step 4 – We manage it</div>
</div>

<div id="form" class="wrap">
<div class="card">

<h2>Start your property intake</h2>

<form id="formEl" action="https://formspree.io/f/mreyjvap" method="POST">

<input type="hidden" name="_subject" value="New RunP8 Lead">

<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone">

<input name="street" placeholder="Address">
<input name="city" placeholder="City">

<select name="service">
<option>Full management</option>
<option>Placement only</option>
</select>

<textarea name="notes" placeholder="Notes"></textarea>

<button class="btn">Submit</button>

</form>

<div class="success" id="done">
Submitted. We will contact you.
</div>

</div>
</div>

<script>
const f = document.getElementById("formEl");
const done = document.getElementById("done");

f.addEventListener("submit", async function(e){
e.preventDefault();

const data = new FormData(f);

const res = await fetch(f.action,{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

if(res.ok){
done.style.display="block";
f.reset();
}else{
alert("Error");
}
});
</script>

</body>
</html>
