<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Add Property | RunP8</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1120;
  color:white;
}

.topbar{
  background:#111827;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.form, .preview{
  background:#111827;
  padding:20px;
  border-radius:12px;
  flex:1;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:8px;
  border:none;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.photos{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.photos img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div><strong>RunP8</strong> — New Listing</div>
  <div>
    <button class="btn-primary" onclick="saveDraft()">Save Draft</button>
    <button class="btn-primary" onclick="publish()">Publish</button>
  </div>
</div>

<div class="container">

  <!-- LEFT FORM -->
  <div class="form">

    <label>Title</label>
    <input id="title" placeholder="Private room near hospital" />

    <label>Address</label>
    <input id="address" placeholder="123 Main St" />

    <label>Price</label>
    <input id="price" placeholder="$1200" />

    <label>Bedrooms</label>
    <input id="bedrooms" placeholder="1" />

    <label>Bathrooms</label>
    <input id="bathrooms" placeholder="1" />

    <label>Description</label>
    <textarea id="description" rows="4"></textarea>

    <button onclick="improveText()">Improve Description</button>

    <label>Photos</label>
    <input type="file" multiple onchange="previewPhotos(event)" />

    <div class="photos" id="photoPreview"></div>

  </div>

  <!-- RIGHT PREVIEW -->
  <div class="preview">
    <h3 id="p_title">Preview Title</h3>
    <p id="p_price">$0</p>
    <p id="p_desc">Description will appear here</p>
    <div class="photos" id="p_photos"></div>
  </div>

</div>

<script>

function previewPhotos(event){
  const preview = document.getElementById("photoPreview");
  const preview2 = document.getElementById("p_photos");

  preview.innerHTML = "";
  preview2.innerHTML = "";

  Array.from(event.target.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = document.createElement("img");
      img.src = e.target.result;
      preview.appendChild(img);

      const img2 = document.createElement("img");
      img2.src = e.target.result;
      preview2.appendChild(img2);
    };
    reader.readAsDataURL(file);
  });
}

function improveText(){
  const desc = document.getElementById("description");
  desc.value = "Private room with a clean and quiet environment near the hospital. Ideal for professionals or travel workers. Utilities included for convenience.";
  updatePreview();
}

function updatePreview(){
  document.getElementById("p_title").innerText =
    document.getElementById("title").value || "Preview Title";

  document.getElementById("p_price").innerText =
    document.getElementById("price").value || "$0";

  document.getElementById("p_desc").innerText =
    document.getElementById("description").value || "Description will appear here";
}

document.querySelectorAll("input, textarea").forEach(el=>{
  el.addEventListener("input", updatePreview);
});

function saveDraft(){
  alert("Draft saved (you can connect this to backend later)");
}

function publish(){
  alert("Listing published (connect to backend later)");
}

</script>

</body>
</html>
