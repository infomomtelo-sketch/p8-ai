<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Add Property | RunP8</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b1120;
  color:white;
}

/* TOP BAR */
.topbar{
  background:#111827;
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:12px;
}

.top-actions{
  display:flex;
  gap:10px;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns: 1.4fr 1fr;
  gap:20px;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

/* CARDS */
.form, .preview{
  background:#111827;
  padding:20px;
  border-radius:14px;
}

/* INPUTS */
input, textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:10px;
  border:none;
  font-size:15px;
}

/* BUTTONS */
button{
  padding:12px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  background:#e5e7eb;
  color:#111;
}

/* PHOTOS */
.photos{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.photos img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}

/* PREVIEW */
.preview{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.preview img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.preview-price{
  font-size:22px;
  font-weight:700;
}

/* SUCCESS MESSAGE */
.message{
  display:none;
  margin-top:12px;
  padding:12px;
  border-radius:10px;
  background:#052e16;
  border:1px solid #166534;
  color:#dcfce7;
}

.message.show{
  display:block;
}

/* MOBILE FIX */
@media (max-width:900px){
  .container{
    grid-template-columns:1fr;
  }

  .top-actions{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
  }

  .photos img{
    width:90px;
    height:90px;
  }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div><strong>RunP8</strong> — New Listing</div>

  <div class="top-actions">
    <button class="btn-secondary" onclick="saveDraft()">Save Draft</button>
    <button class="btn-primary" onclick="publish()">Publish</button>
  </div>
</div>

<div class="container">

  <!-- LEFT FORM -->
  <div class="form">

    <label>Title</label>
    <input id="title" placeholder="Private room near hospital" />

    <label>Address</label>
    <input id="address" placeholder="123 Main St" />

    <label>Price</label>
    <input id="price" placeholder="$1200" />

    <label>Bedrooms</label>
    <input id="bedrooms" placeholder="1" />

    <label>Bathrooms</label>
    <input id="bathrooms" placeholder="1" />

    <label>Description</label>
    <textarea id="description" rows="4"></textarea>

    <button class="btn-secondary" onclick="improveText()">Improve Description</button>

    <label>Photos</label>
    <input type="file" multiple onchange="previewPhotos(event)" />

    <div class="photos" id="photoPreview"></div>

    <div id="message" class="message"></div>

  </div>

  <!-- RIGHT PREVIEW -->
  <div class="preview">
    <h2 id="p_title">Preview Title</h2>
    <div class="preview-price" id="p_price">$0</div>
    <p id="p_desc">Description will appear here</p>
    <div class="photos" id="p_photos"></div>
  </div>

</div>

<script>

function previewPhotos(event){
  const preview = document.getElementById("photoPreview");
  const preview2 = document.getElementById("p_photos");

  preview.innerHTML = "";
  preview2.innerHTML = "";

  Array.from(event.target.files).forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = document.createElement("img");
      img.src = e.target.result;
      preview.appendChild(img);

      const img2 = document.createElement("img");
      img2.src = e.target.result;
      preview2.appendChild(img2);
    };
    reader.readAsDataURL(file);
  });
}

function improveText(){
  const desc = document.getElementById("description");
  desc.value = "Private room with a clean and quiet environment near the hospital. Ideal for professionals or travel workers. Utilities included for convenience.";
  updatePreview();
}

function updatePreview(){
  document.getElementById("p_title").innerText =
    document.getElementById("title").value || "Preview Title";

  document.getElementById("p_price").innerText =
    document.getElementById("price").value || "$0";

  document.getElementById("p_desc").innerText =
    document.getElementById("description").value || "Description will appear here";
}

document.querySelectorAll("input, textarea").forEach(el=>{
  el.addEventListener("input", updatePreview);
});

/* SAVE */
function saveDraft(){
  showMessage("Draft saved (frontend only for now)");
}

/* PUBLISH */
function publish(){
  showMessage("Listing published. Next step: connect backend.");
}

/* MESSAGE */
function showMessage(text){
  const msg = document.getElementById("message");
  msg.innerText = text;
  msg.classList.add("show");

  setTimeout(()=>{
    msg.classList.remove("show");
  },3000);
}

</script>

</body>
</html>
