<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>P8 AI | Property Inquiries</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b1120;
      color:white;
      padding:20px;
    }

    .wrap{
      max-width:800px;
      margin:0 auto;
    }

    h1{
      margin-bottom:20px;
    }

    .card{
      background:#111827;
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .name{
      font-size:18px;
      font-weight:bold;
    }

    .meta{
      color:#9ca3af;
      font-size:14px;
      margin-top:4px;
    }

    .actions{
      margin-top:12px;
      display:flex;
      gap:10px;
    }

    button{
      padding:10px 14px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .approve{ background:#16a34a; color:white; }
    .ask{ background:#2563eb; color:white; }
    .reject{ background:#dc2626; color:white; }

  </style>
</head>

<body>
  <div class="wrap">

    <h1>Property Inquiries</h1>

    <!-- SAMPLE LEAD -->
    <div class="card">
      <div class="name">Elias Cristobal</div>
      <div class="meta">Move-in: April 1 • Phone: 559-825-3038</div>
      <div class="meta">Property: Master Bedroom - Fresno</div>

    <div class="actions">
  <a href="mailto:start@runp8.com?subject=Approve%20Renter&body=Hi%20Elias,%0D%0A%0D%0AYour%20application%20looks%20good.%20We%20can%20move%20forward%20to%20the%20next%20step.%0D%0A%0D%0APlease%20confirm%20your%20availability%20for%20showing.%0D%0A%0D%0A–%20RunP8" class="approve">Approve</a>

  <a href="mailto:start@runp8.com?subject=Request%20More%20Info&body=Hi%20Elias,%0D%0A%0D%0ABefore%20moving%20forward,%20please%20confirm:%0D%0A-%20Move-in%20date%0D%0A-%20Monthly%20income%0D%0A%0D%0AThank%20you.%0D%0A%0D%0A–%20RunP8" class="ask">Ask Info</a>

  <a href="mailto:start@runp8.com?subject=Application%20Update&body=Hi%20Elias,%0D%0A%0D%0AThank%20you%20for%20your%20interest.%0D%0A%0D%0AAt%20this%20time,%20we%20are%20moving%20forward%20with%20other%20applicants.%0D%0A%0D%0AWe%20appreciate%20your%20time.%0D%0A%0D%0A–%20RunP8" class="reject">Reject</a>
</div> 

  </div>
</body>
</html>
