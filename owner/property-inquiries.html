<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>P8 AI | Property Inquiries</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0b1120;
      color:white;
      padding:20px;
    }

    .wrap{
      max-width:800px;
      margin:0 auto;
    }

    h1{
      margin-bottom:20px;
    }

    .card{
      background:#111827;
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .name{
      font-size:18px;
      font-weight:bold;
    }

    .meta{
      color:#9ca3af;
      font-size:14px;
      margin-top:4px;
    }

    .actions{
      margin-top:12px;
      display:flex;
      gap:10px;
    }

    button{
      padding:10px 14px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .approve{ background:#16a34a; color:white; }
    .ask{ background:#2563eb; color:white; }
    .reject{ background:#dc2626; color:white; }

  </style>
</head>

<body>
  <div class="wrap">

    <h1>Property Inquiries</h1>

    <!-- SAMPLE LEAD -->
    <div class="card">
      <div class="name">Elias Cristobal</div>
      <div class="meta">Move-in: April 1 • Phone: 559-825-3038</div>
      <div class="meta">Property: Master Bedroom - Fresno</div>

      <div class="actions">
        <button class="approve">Approve</button>
        <button class="ask">Ask Info</button>
        <button class="reject">Reject</button>
      </div>
    </div>

  </div>
</body>
</html>
